<title>Pasquale Caiazzo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #38bdf8;
    --navy: #0f172a;
    --navy-card: #1e293b;
    --navy-mid: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
  }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--navy);
    font-family: 'Montserrat', -apple-system, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.75rem;
    height: 100dvh;
  }
  .card {
    background: var(--navy-card);
    border-radius: 24px;
    width: 100%;
    max-width: 360px;
    height: 100%;
    max-height: 780px;
    overflow: hidden;
    border: 1px solid var(--navy-mid);
    box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(56,189,248,0.08);
    text-align: center;
    display: flex;
    flex-direction: column;
  }
  .card-header {
    padding: 1.75rem 1.25rem 1.5rem;
    color: var(--text);
    flex-shrink: 0;
    border-bottom: 1px solid var(--navy-mid);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }
  .name {
    font-size: clamp(20px, 6vw, 24px);
    font-weight: 800;
    letter-spacing: -0.2px;
    color: var(--text);
    line-height: 1.15;
    white-space: nowrap;
  }
  .job-title {
    font-size: 18px;
    color: var(--blue);
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .job-sub {
    font-size: 14px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .card-body {
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    flex: 1;
    justify-content: center;
  }
  .qr-wrap {
    padding: 10px;
    border-radius: 14px;
    border: 1px solid var(--navy-mid);
    background: var(--navy);
    display: inline-block;
    box-shadow: 0 0 0 1px rgba(56,189,248,0.15), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .qr-wrap img {
    display: block;
    width: 210px;
    height: 210px;
    image-rendering: pixelated;
    border-radius: 6px;
  }
  .actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }
  .btn {
    display: block;
    text-align: center;
    padding: 12px 0;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Montserrat', sans-serif;
    border-radius: 12px;
    text-decoration: none;
    border: none;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-primary {
    background: var(--blue);
    color: var(--navy);
  }
  .btn-secondary {
