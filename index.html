  .qr-wrap img {

  .actions {

    flex-direction: column;
    gap: 8px;
    width: 100%;

  .btn {
    display: block;
    text-align: center;
    padding: 13px 0;
    font-size: 15px;
    font-weight: 600;
    border-radius: 12px;
    text-decoration: none;
    background: var(--green);
    color: #fff;
    border: none;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .footer {
    padding: 0.75rem;
    font-size: 11px;
    color: #9ca3af;
    flex-shrink: 0;
  }
  .footer a {
    color: var(--green);
    text-decoration: none;
