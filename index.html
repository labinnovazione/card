<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #50AD32;
    --green-light: #f0faea;
    --green-mid: #c2e8b0;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f5ee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 2rem;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    width: 100%;
    max-width: 320px;
    overflow: hidden;
    box-shadow: 0 2px 24px rgba(80,173,50,0.12);
    text-align: center;
  }
  .card-header {
    background: var(--green);
    padding: 1.75rem 1.5rem 1.5rem;
    color: #fff;
  }
  .brand {
    font-size: 13px;
    letter-spacing: 0.08em;
    font-weight: 600;
    opacity: 0.9;
    margin-bottom: 0.75rem;
  }
  .name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .job-title {
    font-size: 12px;
    margin-top: 5px;
    opacity: 0.85;
    font-weight: 400;
  }
  .card-body {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }
  .qr-label {
    font-size: 10px;
    color: #6b7280;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
  }
  .qr-wrap {
    padding: 10px;
    border-radius: 12px;
    border: 1.5px solid var(--green-mid);
    background: #fff;
    display: inline-block;
  }
  .qr-wrap img {
    display: block;
    width: 200px;
    height: 200px;
    image-rendering: pixelated;
  }
  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  .btn {
    display: block;
    text-align: center;
    padding: 11px 0;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.15s;
    background: var(--green);
    color: #fff;
    border: none;
  }
  .btn:hover { opacity: 0.85; }
  .footer {
    padding: 0 1.5rem 1.25rem;
    font-size: 11px;
    color: #9ca3af;
  }
  .footer a {
    color: var(--green);
    text-decoration: none;
    font-weight: 500;
  }
</style>
